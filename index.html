<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Timão - Preto e Branco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Helvetica Bold', sans-serif;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* Cabeçalho preto e branco */
        .cabecalho {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 40px;
            background-color: #ffffff;
            border: 5px solid #000000;
            box-shadow: 15px 15px 0 #333333;
            max-width: 1000px;
            width: 100%;
        }

        .cabecalho h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .cabecalho h1 .preto {
            color: #000000;
            background-color: #ffffff;
            padding: 0 5px;
        }

        .cabecalho h1 .branco {
            color: #ffffff;
            background-color: #000000;
            padding: 0 5px;
            border: 2px solid #000000;
        }

        .cabecalho p {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
            background-color: #000000;
            color: #ffffff;
            display: inline-block;
            padding: 8px 30px;
            border: 3px solid #ffffff;
            letter-spacing: 2px;
        }

        /* Galeria 3x2 */
        .galeria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            background-color: #1a1a1a;
            border: 4px solid #ffffff;
        }

        /* Cards em preto e branco */
        .card {
            background-color: #ffffff;
            border: 4px solid #000000;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 10px 10px 0 #000000;
        }

        .card:hover {
            transform: translate(-5px, -5px);
            box-shadow: 15px 15px 0 #333333;
            border-color: #666666;
        }

        /* Container da imagem */
        .card-imagem {
            width: 100%;
            height: 200px;
            background-color: #000000;
            border-bottom: 4px solid #000000;
            overflow: hidden;
        }

        /* Estilo das imagens placeholder */
        .card-imagem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(120%);
            transition: transform 0.5s, filter 0.3s;
        }

        .card:hover .card-imagem img {
            transform: scale(1.1);
            filter: grayscale(0%) contrast(100%);
        }

        /* Informações do card */
        .card-info {
            padding: 20px 15px;
            background-color: #ffffff;
            text-align: center;
            border-top: 2px solid #000000;
        }

        .card-info h3 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card-info p {
            color: #333333;
            font-weight: bold;
            font-size: 1.1rem;
            background-color: #000000;
            color: #ffffff;
            display: inline-block;
            padding: 5px 15px;
            border: 2px solid #000000;
        }

        /* Rodapé */
        .rodape {
            margin-top: 40px;
            text-align: center;
            padding: 15px 40px;
            background-color: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: 8px 8px 0 #333333;
        }

        .rodape span {
            background-color: #000000;
            color: #ffffff;
            padding: 3px 10px;
            margin: 0 5px;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .galeria {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .cabecalho h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 600px) {
            .galeria {
                grid-template-columns: 1fr;
            }
            
            .cabecalho h1 {
                font-size: 2rem;
            }
            
            .cabecalho p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="cabecalho">
        <h1>
            <span class="preto">SPORT</span>
            <span class="branco">CLUB</span>
            <span class="preto">CORINTHIANS</span>
        </h1>
        <p>⚫  ÍDOLOS EM PRETO E BRANCO  ⚪</p>
    </div>

    <!-- Galeria 3 colunas x 2 linhas -->
    <div class="galeria">

            </div>

        </div>

        <!-- Card 2 - Rivellino -->

            </div>

            </div>
        </div>

        <!-- Card 3 - Marcelinho -->
        <div class="card">

            </div>
            <div class="card-info">
                <h3>MARCELINHO</h3>
                <p>ATACANTE - 7</p>

        </div>

        <!-- Card 4 - Cássio -->
        <div class="card">
            <div class="card-imagem">
                <img src=https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmIfGh9Wx4mMwjLdlH8fvfQO1rMezFrdROSg&s

        <!-- Card 5 - Ronaldo -->
        <div class="card">

            </div>
            <div class="card-info">
                <h3>RONALDO</h3>
                <p>ATACANTE - 9</p>
            </div>
        </div>

        <!-- Card 6 - Neto -->
        <div class="card">
            <div class="card-imagem">
                <img src="https://cdn.meutimao.com.br/_upload/idolos-do-corinthians/neto.jpg
            </div>
            <div class="card-info">
                <h3>NETO</h3>
                <p>MEIA - 10</p>
            </div>
        </div>
    </div>

    <div class="rodape">
        
    </div>

</body>
</html>
